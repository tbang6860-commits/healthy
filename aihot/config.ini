refresh_interval = 30
request_timeout = 30

# --- Firecrawl API（网页抓取）---
[firecrawl]
api_key = fc-13fc2188e1e64841b6f965e78e093a7b
base_url = https://api.firecrawl.dev

# --- twitterapi.io（Twitter/X 数据）---
[twitter]
api_key = new1_8aa4d2d2ba5c49eb927f61dcc4ff1638
base_url = https://api.twitterapi.io

# --- DeepSeek V4 AI 分析 ---
[deepseek]
api_key = sk-94aa400554e24512853b940c8f433d79
base_url = https://api.deepseek.com
model = deepseek-v4-flash

# --- 网页抓取目标 ---
[targets]
weibo_hot = https://weibo.com/ajax/side/hotSearch
baidu_hot = https://top.baidu.com/board?tab=realtime
zhihu_hot = https://www.zhihu.com/api/v3/feed/topstory/hot-lists/total

# --- 聚合与分析 ---
[analysis]
similarity_threshold = 0.7
max_hotspots = 50
categories = 科技,娱乐,社会,财经,体育,国际,军事,健康,教育,其他
